<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jun.AI  - JunDeng's Personal Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="ai-page">

    <header>
        <nav class="nav-container">
            <div class="site-title"><a href="index.html">JunDeng's Personal Web</a></div>
            <button class="settings-toggle" id="settings-toggle">⚙️</button>
            <button class="hamburger" id="hamburger">☰</button>
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="photos.html">我的闲拍</a></li>
                <li><a href="music.html">我的歌单</a></li>
                <li><a href="ai.html" style="color: var(--theme-color);">我的AI</a></li>
            </ul>

            <div class="user-auth-area" id="user-auth-area">
                <button class="auth-btn" id="login-trigger-btn">登录 / 注册</button>

                <div class="user-profile-menu" id="user-profile-menu" style="display: none;">
                    <img src="" alt="Avatar" class="nav-avatar" id="nav-avatar">
                    <div class="dropdown-menu">
                        <span class="nav-nickname" id="nav-nickname">游客</span>
                        <hr>
                        <button id="admin-entry-btn" style="display: none; color: var(--theme-color);">⚙️ 控制台</button>
                        <button id="logout-btn">🚪 退出系统</button>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="ai-container">
        <aside class="control-panel" id="control-panel">
            <div class="panel-header">
                <span class="status-led" id="status-led"></span>
                <span class="panel-title">PARAMETER CONSOLE</span>
            </div>
            
            <div class="knob-stack">
                <div class="knob-row">
                    <div class="knob-label-row">
                        <span>Creativity (Temp)</span>
                        <span class="knob-value" id="val-temp">70.00%</span>
                    </div>
                    <div class="knob-control-area">
                        <div class="knob" id="knob-temp" data-value="0.7"><div class="knob-pointer"></div></div>
                        <div class="progress-container"><div class="progress-bar" id="bar-temp" style="width: 70%;"></div></div>
                    </div>
                </div>

                <div class="knob-row">
                    <div class="knob-label-row">
                        <span>Max Length</span>
                        <span class="knob-value" id="val-len">50.00%</span>
                    </div>
                    <div class="knob-control-area">
                        <div class="knob" id="knob-len" data-value="0.5"><div class="knob-pointer"></div></div>
                        <div class="progress-container"><div class="progress-bar" id="bar-len" style="width: 50%;"></div></div>
                    </div>
                </div>

                <div class="knob-row">
                    <div class="knob-label-row">
                        <span>Top P (Nucleus)</span>
                        <span class="knob-value" id="val-top">80.00%</span>
                    </div>
                    <div class="knob-control-area">
                        <div class="knob" id="knob-top" data-value="0.8"><div class="knob-pointer"></div></div>
                        <div class="progress-container"><div class="progress-bar" id="bar-top" style="width: 80%;"></div></div>
                    </div>
                </div>

                <div class="knob-row">
                    <div class="knob-label-row">
                        <span>Repetition Penalty</span>
                        <span class="knob-value" id="val-pen">20.00%</span>
                    </div>
                    <div class="knob-control-area">
                        <div class="knob" id="knob-pen" data-value="0.2"><div class="knob-pointer"></div></div>
                        <div class="progress-container"><div class="progress-bar" id="bar-pen" style="width: 20%;"></div></div>
                    </div>
                </div>
            </div>

            <div class="system-prompt-section">
                <label>System Prompt (Identity Config)</label>
                <textarea id="system-prompt" placeholder="在此输入自定义指令以塑造你想要 AI 灵魂..."></textarea>
            </div>
        </aside>

        <section class="chat-interface">
            <div class="chat-history" id="chat-history">
                <div class="chat-bubble ai">
                    <div class="avatar ai-avatar">
                        <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                    </div>
                    <div class="bubble-content">
                        你好。我是 Jun.AI。
                        欢迎来到我的世界。
                    </div>
                </div>
            </div>

            <div class="chat-input-area">
                <div class="input-wrapper">
                    <input type="text" id="user-input" placeholder="输入消息...">
                    <button id="send-btn">SEND</button>
                </div>
            </div>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
