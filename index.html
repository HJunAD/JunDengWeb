<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JunDeng's Personal Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav class="nav-container">
            <div class="site-title">
                <a href="index.html">JunDeng's Personal Web</a>
            </div>
            
            <button class="hamburger" id="hamburger">☰</button>
            
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="photos.html">我的闲拍</a></li>
                <li><a href="music.html">我的歌单</a></li>
                <li><a href="ai.html">我的AI</a></li>
            </ul>

            <div class="user-auth-area" id="user-auth-area">
                <button class="auth-btn" id="login-trigger-btn">登录 / 注册</button>

                <div class="user-profile-menu" id="user-profile-menu" style="display: none;">
                    <img src="" alt="Avatar" class="nav-avatar" id="nav-avatar">
                    <div class="dropdown-menu">
                        <span class="nav-nickname" id="nav-nickname">游客</span>
                        <hr>
                        <button id="logout-btn">🚪 退出系统</button>
                    </div>
                </div>
            </div>
            </nav>
    </header>

    <main>
        <h1 class="greeting">Hello, welcome here.</h1>

        <div class="card-container">
            
            <a href="photos.html" class="card">
                <div class="icon-wrapper">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <rect x="3" y="7" width="18" height="13" rx="2" ry="2"></rect>
                        <path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        <circle cx="12" cy="13" r="3"></circle>
                    </svg>
                </div>
                <div class="card-content">
                    <h2>我的闲拍</h2>
                    <p>镜头下的生活碎片与定格瞬间</p>
                </div>
            </a>

            <a href="music.html" class="card">
                <div class="icon-wrapper">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <rect x="2" y="3" width="20" height="18" rx="2" ry="2"></rect>
                        <circle cx="9" cy="12" r="5"></circle>
                        <circle cx="9" cy="12" r="1"></circle>
                        <path d="M18 7l-4.5 4.5"></path>
                        <circle cx="18" cy="7" r="1.5"></circle>
                    </svg>
                </div>
                <div class="card-content">
                    <h2>我的歌单</h2>
                    <p>收录那些直击灵魂的旋律与经典节奏</p>
                </div>
            </a>

            <a href="ai.html" class="card">
                <div class="icon-wrapper">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                    </svg>
                </div>
                <div class="card-content">
                    <h2>我的AI</h2>
                    <p>无聊就来聊聊天吧</p>
                </div>
            </a>

        </div>
    </main>

    <footer>
        <p>&copy; 2026 JunDeng's Personal Web</p>
    </footer>

    <div id="auth-modal" class="auth-modal-overlay">
        <div class="auth-modal-box">
            <button class="close-auth-btn" id="close-auth-btn">×</button>
            <h2 class="auth-title">> 身份验证系统</h2>
            <p class="auth-subtitle">输入代号与密钥。若检测为新代号，系统将自动注册并生成专属头像。</p>

            <div class="auth-form">
                <input type="text" id="auth-username" class="auth-input" placeholder="输入代号 (Username)" autocomplete="off">
                <input type="password" id="auth-password" class="auth-input" placeholder="输入密钥 (Password)">
                
                <div class="avatar-selector-container">
                    <p class="selector-title">>> 若为新代号，请选择专属化身 (老访客可忽略)</p>
                    <div class="avatar-options" id="avatar-options">
                        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Cyber" class="avatar-option active" data-url="https://api.dicebear.com/7.x/bottts/svg?seed=Cyber">
                        <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Mecha" class="avatar-option" data-url="https://api.dicebear.com/7.x/adventurer/svg?seed=Mecha">
                        <img src="https://api.dicebear.com/7.x/micah/svg?seed=Neon" class="avatar-option" data-url="https://api.dicebear.com/7.x/micah/svg?seed=Neon">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Hacker&style=circle" class="avatar-option" data-url="https://api.dicebear.com/7.x/avataaars/svg?seed=Hacker&style=circle">
                        <img src="https://api.dicebear.com/7.x/shapes/svg?seed=Matrix" class="avatar-option" data-url="https://api.dicebear.com/7.x/shapes/svg?seed=Matrix">

                        <div class="avatar-upload-btn" id="avatar-upload-btn" title="上传本地图片 (最大 2MB)">
                            <span>+</span>
                        </div>
                        <input type="file" id="avatar-upload-input" accept="image/png, image/jpeg, image/webp" style="display: none;">
                        
                    </div>
                </div>

                <button id="auth-submit-btn" class="auth-submit-btn">验证 / 注册 (ENTER)</button>
                <p id="auth-msg" class="auth-msg"></p>
            </div>
        </div>
    </div>
    
    <script src="main.js"></script>
</body>
</html>
