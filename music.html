<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的歌单 - JunDeng's Personal Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav class="nav-container">
            <div class="site-title">
                <a href="index.html">JunDeng's Personal Web</a>
            </div>
            <button class="hamburger" id="hamburger">☰</button>
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="photos.html">我的闲拍</a></li>
                <li><a href="music.html" style="color: var(--theme-color);">我的歌单</a></li>
                <li><a href="ai.html">我的AI</a></li>
            </ul>
            
            <div class="user-auth-area" id="user-auth-area">
                <button class="auth-btn" id="login-trigger-btn">登录 / 注册</button>

                <div class="user-profile-menu" id="user-profile-menu" style="display: none;">
                    <img src="" alt="Avatar" class="nav-avatar" id="nav-avatar">
                    <div class="dropdown-menu">
                        <span class="nav-nickname" id="nav-nickname">游客</span>
                        <hr>
                        <button id="logout-btn">🚪 退出系统</button>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <h1 class="page-title" style="text-align: center;">我的歌单</h1>

        <div class="tabs-container" id="tabs-container">
            </div>

        <div id="default-msg" class="default-msg">
            <p>~~🎵正在从打捞黑胶唱片🎵~~</p>
        </div>

        <div id="music-grids-container">
            </div>
    </main>

    <div id="music-modal" class="lightbox">
        <span class="close-lightbox" id="close-music-modal">&times;</span>
        
        <div class="music-modal-content" style="display: flex; flex-direction: row; position: relative;">
            <div id="modal-blur-bg" class="modal-blur-bg"></div>
            
            <div class="modal-content-wrapper" style="flex: 1;">
                <div class="modal-left">
                    <div class="iframe-container">
                        <iframe id="bili-player" referrerpolicy="no-referrer" src="" scrolling="no" border="0" frameborder="no" framespacing="0" allowfullscreen="true"></iframe>
                    </div>
                </div>
                <div class="modal-right">
                    <h2 id="modal-song-title">歌曲名</h2>
                    <p id="modal-song-desc">这是歌曲描述。</p>
                </div>
            </div>

            <div class="local-comment-panel" id="music-comment-panel">
                <div class="panel-header">
                    <h3>💬 灵魂共鸣</h3>
                    <button class="close-panel-btn" id="close-music-panel">&times;</button>
                </div>
                <div class="cmt-list" id="music-cmt-list"></div>
                <div class="cmt-input-group">
                    <textarea id="music-cmt-input" placeholder="留下你的声音..."></textarea>
                    <button class="cmt-send-btn" id="music-cmt-send">发射 (SEND)</button>
                </div>
            </div>

            <button class="comment-icon-btn" id="music-comment-trigger" title="灵魂共鸣">💬</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 JunDeng's Personal Web</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
