<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的闲拍 - JunDeng's Personal Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav class="nav-container">
            <div class="site-title">
                <a href="index.html">JunDeng's Personal Web</a>
            </div>
            <button class="hamburger" id="hamburger">☰</button>
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="photos.html" style="color: var(--theme-color);">我的闲拍</a></li> <li><a href="music.html">我的歌单</a></li>
                <li><a href="ai.html">我的AI</a></li>
            </ul>

            <div class="user-auth-area" id="user-auth-area">
                <button class="auth-btn" id="login-trigger-btn">登录 / 注册</button>

                <div class="user-profile-menu" id="user-profile-menu" style="display: none;">
                    <img src="" alt="Avatar" class="nav-avatar" id="nav-avatar">
                    <div class="dropdown-menu">
                        <span class="nav-nickname" id="nav-nickname">游客</span>
                        <hr>
                        <button id="logout-btn">🚪 退出系统</button>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <h1 class="page-title">我的闲拍</h1>
        <p class="empty-state">状态：持续更新中······</p>

        <div class="masonry-gallery" id="gallery-container">
            </div>
    </main>

    <div id="lightbox" class="lightbox">
        <span class="close-lightbox" id="close-photo-modal">&times;</span>
        
        <div class="photo-modal-content" style="position: relative; width: 90%; max-width: 1200px; height: 85vh; margin: 5vh auto; display: flex; justify-content: center; align-items: center;">
            
            <img class="lightbox-content" id="lightbox-img" style="max-height: 100%; max-width: 100%; box-shadow: 0 0 20px rgba(0,0,0,0.8);">
            
            <div style="position: absolute; bottom: -40px; display: flex; gap: 20px; align-items: center;">
                <div id="lightbox-caption" style="color: #ccc; font-size: 1.2rem;"></div>
                <button class="comment-trigger-btn" id="photo-comment-trigger">💬 评论</button>
            </div>

            <div class="local-comment-panel" id="photo-comment-panel">
                <div class="panel-header">
                    <h3>💬评论</h3>
                    <button class="close-panel-btn" id="close-photo-panel">&times;</button>
                </div>
                <div class="cmt-list" id="photo-cmt-list"></div>
                <div class="cmt-input-group">
                    <textarea id="photo-cmt-input" placeholder="这张照片让你想到了什么..."></textarea>
                    <button class="cmt-send-btn" id="photo-cmt-send">发送 (SEND)</button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 JunDeng's Personal Web</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
